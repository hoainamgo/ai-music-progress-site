<!doctype html><html lang="vi"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Music Project — Progress</title>
<meta http-equiv="refresh" content="30">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#0f0e17;color:#e7e7ee;padding:24px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
h1{font-size:22px;background:linear-gradient(90deg,#7c5cff,#ff7eb6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.meta{font-size:13px;color:#9a9ab0}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:760px){.wrap{grid-template-columns:1fr}}
.card{background:#1a1925;border:1px solid #2a2940;border-radius:14px;padding:18px}
h2{font-size:16px;margin-bottom:14px;color:#fff}
.stats{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#23223a;border-radius:10px;padding:10px 14px;min-width:90px}
.stat span{display:block;font-size:20px;font-weight:700;color:#fff}
.stat label{font-size:11px;color:#9a9ab0}
.prog{margin:10px 0}
.prog label{font-size:12px;color:#9a9ab0;display:block;margin-bottom:4px}
.bar{height:10px;background:#23223a;border-radius:6px;overflow:hidden}
.fill{height:100%;border-radius:6px}
.prog small{font-size:12px;color:#cfcfe6}
details{margin-top:12px}
summary{cursor:pointer;font-size:13px;color:#7c5cff}
.themes{list-style:none;margin-top:8px;columns:2;font-size:12px}
.themes li{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #23223a}
.themes span{color:#9a9ab0}
.overall{background:#1a1925;border:1px solid #2a2940;border-radius:14px;padding:16px;margin-bottom:18px;text-align:center}
.overall b{font-size:28px;color:#fff}
footer{margin-top:20px;font-size:12px;color:#6a6a85;text-align:center}
a{color:#7c5cff}
</style></head><body>
<header><h1>🎵 AI Music Project — Progress Tracker</h1>
<div class="meta" id="upd">Loading...</div></header>
<div class="overall" id="ov">Tổng tiến độ: <b id="ovn">...</b></div>
<div class="wrap" id="wrap"></div>
<footer>Drive: <a href="https://drive.google.com/drive/folders/1Mi4H7-iRGbncp_kL7dm7Wh6BfoIUdDC6">AI_Music_Project</a>
· Powered by Mai 💜</footer>
<script>
const C1='#7c5cff',C2='#ff7eb6';
function bar(p,c){return `<div class="bar"><div class="fill" style="width:${p}%;background:${c}"></div></div>`}
function themes(o){return Object.entries(o).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<li><span>${k}</span><b>${v}</b></li>`).join('')}
fetch('./progress_data.json').then(r=>r.json()).then(d=>{
  document.getElementById('upd').textContent='Cập nhật: '+d.updated+' · Auto-refresh 30s';
  const all=d.sessions.reduce((a,s)=>({g:a.g+s.gen,t:a.t+s.total}),{g:0,t:0});
  document.getElementById('ovn').textContent=all.g+'/'+all.t+' ('+Math.round(100*all.g/all.t)+'%)';
  document.getElementById('wrap').innerHTML=d.sessions.map((s,i)=>{
    const c=i===0?C1:C2;
    return `<div class="card"><h2>${s.label}</h2>
      <div class="stats">
        <div class="stat"><span>${s.gen}/${s.total}</span><label>Đã sinh (mureka-7.5)</label></div>
        <div class="stat"><span>${s.dl}/${s.total}</span><label>Đã download</label></div>
        <div class="stat"><span>${s.lang}</span><label>Ngôn ngữ</label></div></div>
      <div class="prog"><label>Tiến độ sinh</label>${bar(s.pct,c)}<small>${s.pct}%</small></div>
      <div class="prog"><label>Tiến độ download</label>${bar(s.dl_pct,'#36d399')}<small>${s.dl_pct}%</small></div>
      <details><summary>Theme breakdown (${Object.keys(s.themes).length} themes)</summary>
      <ul class="themes">${themes(s.themes)}</ul></details></div>`;
  }).join('');
}).catch(e=>{document.getElementById('upd').textContent='Lỗi tải dữ liệu';});
</script></body></html>
